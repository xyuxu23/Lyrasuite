<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <title>LyraSuite-login</title>

    <link rel="stylesheet" th:href="@{/css/tabler.min.css}">
    <link rel="stylesheet" th:href="@{/css/bootstrap-icons.min.css}">
</head>

<body class="d-flex flex-column">
<div class="page page-center">
    <div class="container container-tight py-4">

        <!-- Logo -->
        <div class="text-center mb-4">
            <div class="d-flex flex-column align-items-center">
                <i class="bi bi-shield-lock-fill text-primary" style="font-size: 4rem;"></i>
                <span class="mt-2"
                      style="font-size: 2rem; font-weight: 700; letter-spacing: -1px;">
                    LyraSuite
                </span>
            </div>
        </div>

        <!-- Card -->
        <div class="card card-md">
            <div class="card-body p-5">

                <form th:action="@{/perform_login}" method="post" autocomplete="off" novalidate>

                    <!-- Error -->
                    <div th:if="${param.error}" class="alert alert-danger" role="alert">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        Incorrect username or password.
                    </div>

                    <!-- Logout -->
                    <div th:if="${param.logout}" class="alert alert-success" role="alert">
                        <i class="bi bi-check-circle me-2"></i>
                        You have been logged out.
                    </div>

                    <!-- Username -->
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text"
                               name="username"
                               class="form-control"
                               placeholder="Username"
                               autocomplete="off"
                               required
                               autofocus>
                    </div>

                    <!-- Password -->
                    <div class="mb-2">
                        <label class="form-label">Password</label>

                        <div class="input-group input-group-flat">
                            <input type="password"
                                   id="password"
                                   name="password"
                                   class="form-control"
                                   placeholder="Password"
                                   autocomplete="off"
                                   required>

                            <span class="input-group-text">
                                <a href="javascript:void(0)"
                                   class="link-secondary"
                                   title="Show password"
                                   data-bs-toggle="tooltip"
                                   onclick="togglePassword()">
                                    <i class="bi bi-eye" id="toggleIcon"></i>
                                </a>
                            </span>
                        </div>
                    </div>

                    <!-- Submit -->
                    <div class="form-footer">
                        <button type="submit" class="btn btn-primary w-100">
                            Sign in
                        </button>
                    </div>

                </form>
            </div>
        </div>

        <!-- Footer -->
        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</div>

<script th:src="@{/js/tabler.min.js}"></script>

<script>
    function togglePassword() {
        const pwd = document.getElementById("password");
        const icon = document.getElementById("toggleIcon");

        if (pwd.type === "password") {
            pwd.type = "text";
            icon.classList.remove("bi-eye");
            icon.classList.add("bi-eye-slash");
        } else {
            pwd.type = "password";
            icon.classList.remove("bi-eye-slash");
            icon.classList.add("bi-eye");
        }
    }
</script>

</body>
</html>
