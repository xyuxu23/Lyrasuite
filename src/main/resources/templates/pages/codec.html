<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:replace="~{layout :: layout(~{::content}, ~{::scripts})}">
    <div th:fragment="content">

        <div class="page-header d-print-none mb-3">
            <div class="row align-items-center">
                <div class="col">
                    <h2 class="page-title">
                        <i class="bi bi-arrow-left-right text-green me-2"></i> Codec Tools
                    </h2>
                    <div class="text-muted mt-1">Encode and decode common text formats locally in browser.</div>
                </div>
            </div>
        </div>

        <div class="row row-cards">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Codec Settings</h3>
                    </div>
                    <div class="card-body">
                        <form id="codecForm" onsubmit="return false;">
                            <div class="mb-3">
                                <label class="form-label">Codec Type</label>
                                <select class="form-select" id="codecType">
                                    <option value="base64" selected>Base64</option>
                                    <option value="url">URL</option>
                                    <option value="unicode">Unicode</option>
                                    <option value="hex">Hex</option>
                                    <option value="html">HTML Entity</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Input</label>
                                <textarea id="codecInput" class="form-control" rows="12"
                                          style="font-family: 'Consolas', monospace; resize: vertical;"
                                          placeholder="Input text here..."></textarea>
                            </div>

                            <div class="row g-2">
                                <div class="col-6">
                                    <button type="button" class="btn btn-primary w-100" onclick="CodecModule.encode()">
                                        <i class="bi bi-box-arrow-in-right me-2"></i> Encode
                                    </button>
                                </div>
                                <div class="col-6">
                                    <button type="button" class="btn btn-success w-100" onclick="CodecModule.decode()">
                                        <i class="bi bi-box-arrow-left me-2"></i> Decode
                                    </button>
                                </div>
                                <div class="col-6">
                                    <button type="button" class="btn btn-outline-secondary w-100" onclick="CodecModule.swap()">
                                        <i class="bi bi-arrow-down-up me-2"></i> Swap
                                    </button>
                                </div>
                                <div class="col-6">
                                    <button type="button" class="btn btn-outline-danger w-100" onclick="CodecModule.clear()">
                                        <i class="bi bi-trash me-2"></i> Clear
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card h-100">
                    <div class="card-header">
                        <h3 class="card-title">Output Result</h3>
                        <div class="card-actions">
                            <button class="btn btn-sm btn-ghost-secondary" onclick="CodecModule.copyResult()">
                                <i class="bi bi-clipboard me-1"></i> Copy
                            </button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <textarea id="codecOutput" class="form-control h-100 border-0"
                                  style="font-family: 'Consolas', monospace; resize: none; min-height: 480px; font-size: 0.9rem;"
                                  readonly placeholder="Result will appear here..."></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

</th:block>
</html>
