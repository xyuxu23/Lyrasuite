<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:replace="~{layout :: layout(~{::content}, ~{::scripts})}">
    <div th:fragment="content">
        <div class="page-header d-print-none mb-3">
            <div class="row align-items-center">
                <div class="col">
                    <h2 class="page-title">
                        <i class="bi bi-hdd-network-fill text-purple me-2"></i> JNDI Injection Server
                    </h2>
                    <div class="text-muted mt-1">Host malicious RMI/LDAP services for remote class loading.</div>
                </div>
            </div>
        </div>
        <div class="row row-cards">
            <!-- 左侧：控制面板 -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">JNDI Server Config</h3>
                        <div class="card-actions">
                            <span class="status status-dot status-red" id="jndiStatusDot"></span>
                            <span id="jndiStatusText">Stopped</span>
                        </div>
                    </div>
                    <div class="card-body">
                        <form onsubmit="return false;">
                            <div class="mb-3">
                                <label class="form-label">Listen IP Address</label>
                                <input type="text" class="form-control" id="jndiIp" placeholder="127.0.0.1">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">JNDI Type</label>
                                <select class="form-select" id="jndiType" onchange="JndiModule.onTypeChange()"></select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Bypass Strategy (RMI)</label>
                                <select class="form-select" id="jndiBypass" disabled></select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Serialized Gadget (LDAP)</label>
                                <select class="form-select" id="jndiGadget" disabled></select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Command / Payload</label>
                                <input type="text" class="form-control" id="jndiCommand" value="calc">
                            </div>

                            <div class="row g-2 mt-4">
                                <div class="col-6">
                                    <button class="btn btn-primary w-100" id="btnStartJndi" onclick="JndiModule.start()">
                                        <i class="bi bi-play-fill me-1"></i> Start
                                    </button>
                                </div>
                                <div class="col-6">
                                    <button class="btn btn-danger w-100" id="btnStopJndi" onclick="JndiModule.stop()" disabled>
                                        <i class="bi bi-stop-fill me-1"></i> Stop
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
                <!-- 注入链接预览 -->
                <div class="card mt-3">
                    <div class="card-header"><h3 class="card-title">Exploit Links</h3></div>
                    <div class="card-body p-2">
                        <div class="mb-2">
                            <label class="form-label small text-muted">LDAP:</label>
                            <input type="text" id="resLdap" class="form-control form-control-sm" readonly>
                        </div>
                        <div>
                            <label class="form-label small text-muted">RMI:</label>
                            <input type="text" id="resRmi" class="form-control form-control-sm" readonly>
                        </div>
                    </div>
                </div>
            </div>
            <!-- 右侧：黑色控制台 -->
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">
                            <i class="bi bi-terminal me-2 text-secondary"></i> Console Output
                        </h3>
                        <div class="card-actions">
                            <button class="btn btn-sm btn-ghost-secondary" onclick="JndiModule.clearLog()" title="Clear Logs">
                                <i class="bi bi-trash me-1"></i> Clear
                            </button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <textarea id="jndiLogArea" class="form-control h-120 border-0"
                                  style="font-family: 'Consolas', monospace; resize: none; min-height: 400px; font-size: 0.9rem;"
                                  readonly placeholder="Waiting for commands..."></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>
</html>
